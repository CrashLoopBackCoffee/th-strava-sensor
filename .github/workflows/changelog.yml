name: Generate Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate changelog'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  # renovate: datasource=npm packageName=auto
  AUTO_VERSION: 11.3.6
  GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}

jobs:
  generate-changelog:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Determine next release version with auto
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo 'No version tags found (expected tags like v1.2.3)'
            exit 1
          fi

          BUMP_TYPE=$(
            npx -y \
              --package=auto@${{ env.AUTO_VERSION }} \
              --package=@auto-it/git-tag@${{ env.AUTO_VERSION }} \
              auto version --from "$LATEST_TAG" --quiet \
              | grep -Eo 'major|minor|patch' \
              | tail -n1
          )

          if [ -z "$BUMP_TYPE" ]; then
            echo 'Failed to determine bump type via auto version'
            exit 1
          fi

          VERSION_NO_PREFIX="${LATEST_TAG#v}"
          if ! [[ "$VERSION_NO_PREFIX" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported tag format: $LATEST_TAG"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NO_PREFIX"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unsupported bump type: $BUMP_TYPE"
              exit 1
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          {
            echo "latest_tag=$LATEST_TAG"
            echo "bump_type=$BUMP_TYPE"
            echo "version=$NEXT_VERSION"
            echo "version_tag=v$NEXT_VERSION"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}

      - name: Generate changelog with auto
        run: >
          npx -y
          --package=auto@${{ env.AUTO_VERSION }}
          --package=@auto-it/git-tag@${{ env.AUTO_VERSION }}
          auto changelog
          --from "${{ steps.version.outputs.latest_tag }}"
          --to HEAD
          --no-git-commit
          --title "${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}

      - name: Detect changelog changes
        id: changelog_changes
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "has_changelog_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelog_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup project
        if: steps.changelog_changes.outputs.has_changelog_changes == 'true'
        uses: ./.github/actions/setup-project
        with:
          python-version: "3.13"

      - name: Update pyproject.toml version
        if: steps.changelog_changes.outputs.has_changelog_changes == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" pyproject.toml
          echo "Updated version to $NEW_VERSION"

      - name: Update uv.lock with new version
        if: steps.changelog_changes.outputs.has_changelog_changes == 'true'
        run: |
          # Sync lock file to update project version
          uv sync
          echo "Updated uv.lock with new project version"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="release/next"
          PR_TITLE="chore: prepare release ${{ steps.version.outputs.version_tag }}"
          PR_BODY="## Release Preparation

          This PR prepares for release \`${{ steps.version.outputs.version_tag }}\` by:

          - 📝 Updating CHANGELOG.md with all merged PRs since last release
          - 🔢 Bumping version to \`${{ steps.version.outputs.version_tag }}\` (automatically determined by auto)

          Once this PR is merged, a new GitHub release will be automatically created.

          ---
          🤖 This PR was automatically created by the changelog workflow."

          # Create or checkout branch (git checkout -B creates or resets to new branch)
          git checkout -B "$BRANCH_NAME"

          # Add and commit changes
          git add .
          git commit -m "chore: prepare release ${{ steps.version.outputs.version_tag }}

          - Update CHANGELOG.md with latest changes
          - Bump version to ${{ steps.version.outputs.version_tag }}"

          # Push branch (force-with-lease is safe for both new and existing)
          git push origin "$BRANCH_NAME" --force-with-lease

          # Check if open PR exists and create or update accordingly
          if gh pr view "$BRANCH_NAME" --json state --jq '.state' 2>/dev/null | grep -q "OPEN"; then
            echo "Updating existing open PR"
            gh pr edit "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY"
          else
            echo "Creating new PR (no open PR found)"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --label "release,automated" \
              --base main
          fi
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
