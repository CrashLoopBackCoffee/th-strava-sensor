name: Generate Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force regenerate changelog"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  # renovate: datasource=npm packageName=auto
  AUTO_VERSION: 11.3.6
  GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}

jobs:
  generate-changelog:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate changelog with auto
        run: npx -y auto@${{ env.AUTO_VERSION }} changelog --no-git-commit
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}

      - name: Extract version from changelog
        id: version
        run: |
          HEADER=$(
            grep -m1 -E '^## (\[v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?\]|v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)' CHANGELOG.md \
            || true
          )
          VERSION=$(echo "$HEADER" | sed -E 's/^## \[?v?([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?)\]?.*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version from CHANGELOG.md"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          python-version: "3.13"

      - name: Update pyproject.toml version
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" pyproject.toml
          echo "Updated version to $NEW_VERSION"

      - name: Update uv.lock with new version
        run: |
          # Sync lock file to update project version
          uv sync
          echo "Updated uv.lock with new project version"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="release/next"
          PR_TITLE="chore: prepare release ${{ steps.version.outputs.version_tag }}"
          PR_BODY="## Release Preparation

          This PR prepares for release \`${{ steps.version.outputs.version_tag }}\` by:

          - 📝 Updating CHANGELOG.md with all merged PRs since last release
          - 🔢 Bumping version to \`${{ steps.version.outputs.version_tag }}\` (automatically determined by auto)

          Once this PR is merged, a new GitHub release will be automatically created.

          ---
          🤖 This PR was automatically created by the changelog workflow."

          # Create or checkout branch (git checkout -B creates or resets to new branch)
          git checkout -B "$BRANCH_NAME"

          # Add and commit changes
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: prepare release ${{ steps.version.outputs.version_tag }}

            - Update CHANGELOG.md with latest changes
            - Bump version to ${{ steps.version.outputs.version_tag }}"
          else
            echo "No staged changes to commit; using existing commits on branch"
          fi

          # Push branch (force-with-lease is safe for both new and existing)
          git push origin "$BRANCH_NAME" --force-with-lease

          # Check if open PR exists and create or update accordingly
          if gh pr view "$BRANCH_NAME" --json state --jq '.state' 2>/dev/null | grep -q "OPEN"; then
            echo "Updating existing open PR"
            gh pr edit "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY"
          else
            echo "Creating new PR (no open PR found)"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --label "release,automated" \
              --base main
          fi
        env:
          GITHUB_TOKEN: ${{ env.GH_TOKEN }}
