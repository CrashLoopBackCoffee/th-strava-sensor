name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read
  packages: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.head.ref, 'release/') ||
       contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Read release version from pyproject.toml
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          version = data['project']['version']

          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as fh:
              fh.write(f'version={version}\n')
              fh.write(f'tag=v{version}\n')
          PY

      - name: Check if tag exists
        id: tag_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ['VERSION']
          escaped = re.escape(version)

          start_patterns = [
              re.compile(rf'^#\s+v?{escaped}(?:\s|\(|$)'),
              re.compile(rf'^##\s+\[?v?{escaped}(?:\]|[\s-]|$)'),
          ]
          stop_patterns = [
              re.compile(r'^#\s+v?[0-9]+\.[0-9]+\.[0-9]+'),
              re.compile(r'^##\s+\[?v?[0-9]+\.[0-9]+\.[0-9]+'),
              re.compile(r'^#\s+Changelog\s*$'),
          ]

          lines = Path('CHANGELOG.md').read_text(encoding='utf-8').splitlines(keepends=True)
          start_idx: int | None = None

          for idx, line in enumerate(lines):
              if any(pattern.match(line) for pattern in start_patterns):
                  start_idx = idx + 1
                  break

          if start_idx is None:
              raise SystemExit(f'Failed to find changelog section header for version {version}')

          selected: list[str] = []
          for line in lines[start_idx:]:
              if any(pattern.match(line) for pattern in stop_patterns):
                  break
              selected.append(line)

          body = ''.join(selected).strip()
          if not body:
              raise SystemExit(
                  f'Failed to extract release notes for version {version} from CHANGELOG.md'
              )

          Path('release-notes.md').write_text(body + '\n', encoding='utf-8')
          print(f'Extracted release notes for version {version}')
          PY
        env:
          VERSION: ${{ steps.tag_check.outputs.version }}

      - name: Create Git Tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "${{ steps.tag_check.outputs.tag }}" -m "Release ${{ steps.tag_check.outputs.version }}"
          git push origin "${{ steps.tag_check.outputs.tag }}"

      - name: Build artifacts
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          # Build wheel and sdist
          uv build

          echo "Built artifacts:"
          ls -la dist/

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_check.outputs.tag }}
          name: Release ${{ steps.tag_check.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false

      - name: Generate lowercase image name
        if: steps.tag_check.outputs.exists == 'false'
        id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.tag_check.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            UV_VERSION=0.8.11

      - name: Skip - Tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "::notice::Tag ${{ steps.tag_check.outputs.tag }} already exists. Skipping release creation."
